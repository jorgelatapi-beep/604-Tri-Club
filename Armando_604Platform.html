<title>Armando · Maratón BMO Vancouver — Training Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6f9;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --border: #dde2ea;
  --border2: #c8d0dc;
  --gold: #b07e0a;
  --gold-bg: #fdf3d7;
  --gold-border: #f0c842;
  --purple: #6d28d9;
  --teal: #0d9488;
  --red: #dc2626;
  --green: #059669;
  --blue: #2563eb;
  --orange: #ea580c;
  --text: #1a2030;
  --text2: #445566;
  --text3: #8899aa;
  --swim: #0284c7;
  --bike: #d97706;
  --run: #059669;
  --str: #db2777;
  --rest: #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: #1a2030;
  border-bottom: 3px solid var(--gold-border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--gold-border);
  text-transform: uppercase;
}
.logo span { color: #8899aa; font-weight: 400; font-size: 13px; margin-left: 10px; letter-spacing: 1px; }
.header-date {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #8899aa;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.today-badge {
  background: var(--gold-border);
  color: #1a2030;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── ATHLETE TABS ── */
.athlete-nav {
  display: flex;
  gap: 2px;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.ath-tab {
  padding: 12px 22px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
  white-space: nowrap;
}
.ath-tab:hover { color: var(--text2); background: var(--bg3); }
.ath-tab.active { color: #1a2030; border-bottom-color: var(--gold-border); background: transparent; }
.ath-tab .ath-sub { font-weight: 400; font-size: 10px; display: block; color: var(--text3); letter-spacing: 0; margin-top: 1px; }

/* ── MAIN ── */
.main-inner { max-width: 1100px; }
.athlete-panel { display: none; }
.athlete-panel.active { display: block; }

/* ── WEEK HEADER ── */
.week-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.week-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 26px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text);
}
.week-range { font-size: 13px; color: var(--text3); }
.phase-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.phase-base { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.tss-total { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text3); }
.tss-total strong { color: var(--gold); font-size: 14px; }

/* ── WEEK GRID ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 18px;
}
.day-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  min-height: 84px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.day-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.1); transform: translateY(-1px); }
.day-card.selected { border-color: #1a2030 !important; box-shadow: 0 2px 8px rgba(26,32,48,.15); }
.day-card.today-card { border-color: var(--gold-border); background: #fffef5; }
.today-pip {
  position: absolute; top: 7px; right: 7px;
  width: 6px; height: 6px;
  background: var(--gold-border);
  border-radius: 50%;
}
.day-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1px;
}
.day-date { font-size: 10px; color: var(--text3); margin-bottom: 7px; }
.day-icon { font-size: 20px; margin-bottom: 4px; display: block; }
.day-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  line-height: 1.3;
  color: var(--text);
}
.day-dur { font-size: 10px; color: var(--text3); margin-top: 3px; }
.type-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 0 0 6px 6px;
}
.tb-swim { background: var(--swim); }
.tb-bike { background: var(--bike); }
.tb-run { background: var(--run); }
.tb-str { background: var(--str); }
.tb-rest { background: var(--rest); }

/* ── SESSION DETAIL ── */
.session-detail {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:translateY(0); } }
.sd-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.sd-icon { font-size: 36px; }
.sd-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text);
}
.sd-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
.sd-tags { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
.tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
}
.tag-swim { background: #e0f2fe; color: var(--swim); border: 1px solid #bae6fd; }
.tag-bike { background: #fef3c7; color: var(--bike); border: 1px solid #fde68a; }
.tag-run  { background: #d1fae5; color: var(--run); border: 1px solid #6ee7b7; }
.tag-str  { background: #fce7f3; color: var(--str); border: 1px solid #fbcfe8; }
.tag-rest { background: #ede9fe; color: var(--rest); border: 1px solid #c4b5fd; }
.tag-today { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); }

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.stat-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  text-align: center;
}
.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #1a2030;
  display: block;
}
.stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Section head */
.section-head {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 8px;
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-head::before {
  content: '';
  display: inline-block;
  width: 3px; height: 14px;
  background: #1a2030;
  border-radius: 2px;
}

/* Table */
table { width: 100%; border-collapse: collapse; border-radius: 6px; overflow: hidden; }
th {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: top;
  line-height: 1.5;
  color: var(--text2);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
td:first-child { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); }

/* Notes */
.coach-note {
  background: var(--gold-bg);
  border: 1px solid var(--gold-border);
  border-left: 4px solid var(--gold-border);
  border-radius: 0 6px 6px 0;
  padding: 14px 16px;
  margin-top: 16px;
  font-size: 13px;
  line-height: 1.7;
  color: #5a3e00;
}
.coach-note strong { color: var(--gold); }

.info-box {
  background: #e0f2fe;
  border: 1px solid #bae6fd;
  border-left: 4px solid var(--swim);
  border-radius: 0 6px 6px 0;
  padding: 14px 16px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.7;
  color: #0c4a6e;
}
.info-box strong { color: var(--swim); }

.trainer-tip {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.trainer-tip strong {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 4px;
}

/* Rest */
.rest-card {
  text-align: center;
  padding: 32px;
  color: var(--text3);
}
.rest-card .big-icon { font-size: 48px; margin-bottom: 12px; }
.rest-card p { font-size: 14px; line-height: 1.8; max-width: 400px; margin: 0 auto; color: var(--text2); }

/* ── LAYOUT WITH SIDEBAR ── */
.app-body {
  display: flex;
  min-height: calc(100vh - 56px - 52px);
}

/* ── WEEK SIDEBAR ── */
.week-sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 108px;
  height: calc(100vh - 108px);
  overflow-y: auto;
}
.sidebar-section {
  padding: 0 12px 8px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-top: 8px;
}
.week-item {
  display: flex;
  flex-direction: column;
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
  gap: 2px;
}
.week-item:hover { background: var(--bg3); }
.week-item.active { border-left-color: #1a2030; background: var(--bg3); }
.week-item.current { border-left-color: var(--gold-border); }
.week-item.current.active { border-left-color: var(--gold-border); background: var(--gold-bg); }
.wi-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  letter-spacing: .5px;
}
.week-item.active .wi-label { color: #1a2030; }
.wi-range { font-size: 10px; color: var(--text3); }
.wi-phase {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: 1px;
}
.wi-badge {
  display: inline-block;
  font-size: 9px;
  background: var(--gold-bg);
  color: var(--gold);
  border: 1px solid var(--gold-border);
  border-radius: 2px;
  padding: 1px 5px;
  font-family: 'Space Mono', monospace;
  letter-spacing: .5px;
  margin-top: 2px;
  width: fit-content;
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  padding: 20px 24px 40px;
  max-width: 100%;
  overflow: hidden;
}




/* ── CYCLE AUTO-TRACKER ── */
.cycle-status {
  background: #fff;
  border: 1px solid #fbcfe8;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.cs-today {
  display: flex;
  flex-direction: column;
  padding-right: 14px;
  border-right: 1px solid #fbcfe8;
}
.cs-day {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 24px;
  color: #db2777;
  line-height: 1;
}
.cs-day-lbl { font-size: 9px; color: #be185d; text-transform: uppercase; letter-spacing: .5px; }
.cs-phase {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: #9d174d;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.cs-next { font-size: 11px; color: #be185d; margin-top: 1px; }
.cs-forecast {
  margin-left: auto;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.cs-fc-item {
  background: #fdf2f8;
  border-radius: 5px;
  padding: 5px 10px;
  text-align: center;
}
.cs-fc-date {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #9d174d;
  display: block;
}
.cs-fc-lbl { font-size: 8px; color: #be185d; text-transform: uppercase; letter-spacing: .5px; }
.cs-config {
  font-size: 10px;
  color: #be185d;
  margin-top: 6px;
  width: 100%;
  opacity: 0.8;
}

/* ── CYCLE PHASE MODULE (Valeria) ── */
.cycle-banner {
  background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
  border: 1px solid #fbcfe8;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.cycle-head {
  display: flex;
  align-items: center;
  gap: 8px;

const _DIAS_ABBR = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const TODAY_DATE = _HOY.getDate() + ' ' + _MESES_ABBR[_HOY.getMonth()];  // auto: ej. '17 Jun'

// Mostrar la fecha real en el encabezado (auto-actualiza cada día)
(function(){

// ── RENDER ──────────────────────────────────────

const TYPE_CLS = {swim:'tb-swim', bike:'tb-bike', run:'tb-run', str:'tb-str', rest:'tb-rest'};
const TAG_CLS  = {swim:'tag-swim', bike:'tag-bike', run:'tag-run', str:'tag-str', rest:'tag-rest'};

function buildGrid(id, data, key) {
  const g = document.getElementById(id);
  g.innerHTML = '';
  data.forEach((d,i) => {
    const isToday = d.dayDate === TODAY_DATE;
    const div = document.createElement('div');
    div.className = 'day-card' + (isToday ? ' today-card' : '');
    div.innerHTML = `${isToday?'<div class="today-pip"></div>':''}
      <div class="day-label">${d.dayLabel}</div>
      <div class="day-date">${d.dayDate}</div>
      <span class="day-icon">${d.icon}</span>
      <div class="day-name">${d.title}</div>
      <div class="day-dur">${d.dur}</div>
      <div class="type-bar ${TYPE_CLS[d.type]||''}"></div>`;
    div.onclick = () => showDetail(key, i);
    g.appendChild(div);
  });
}

function showDetail(key, idx) {
  const arr = getData(key);
  const d = arr[idx];
  const el = document.getElementById('detail-' + key);
  document.getElementById('grid-' + key).querySelectorAll('.day-card')
    .forEach((c,i) => c.classList.toggle('selected', i===idx));
  const c = d.content;
  let h = `<div class="sd-header">
    <div class="sd-icon">${d.icon}</div>
    <div>
      <div class="sd-title">${d.title}</div>
      <div class="sd-meta">${d.dayLabel} · ${d.dayDate} · ${d.dur}</div>
    </div>
    <div class="sd-tags">
      <span class="tag ${TAG_CLS[d.type]||''}">${d.type.toUpperCase()}</span>
      ${d.today?'<span class="tag tag-today">HOY</span>':''}
    </div>
  </div>`;
  if(c.kind === 'rest') {
    h += `<div class="rest-card"><div class="big-icon">🧘</div><p>${c.note}</p></div>`;
  } else {
    if(c.stats) { h += '<div class="stats-row">'; c.stats.forEach(s => { h += `<div class="stat-box"><span class="stat-val">${s.v}</span><span class="stat-lbl">${s.l}</span></div>`; }); h += '</div>'; }
    if(c.sections) c.sections.forEach(sec => {
      h += `<div class="section-head">${sec.head}</div><table><thead><tr>`;
      sec.cols.forEach(col => h += `<th>${col}</th>`);
      h += '</tr></thead><tbody>';
      sec.rows.forEach(row => { h += '<tr>'; row.forEach(cell => h += `<td>${cell}</td>`); h += '</tr>'; });
      h += '</tbody></table>';
    });
    if(c.poolNote) h += `<div class="info-box"><strong>🏊 Sesión en Alberca (regla permanente)</strong><br>Todas las sesiones de nado de Valeria son en alberca. Solo aguas abiertas cuando se especifique como fecha especial o competencia.</div>`;
    if(c.cycleOptions) {
      h += `<div class="intensity-options">
        <div class="int-opt green">
          <div class="int-opt-head">${c.cycleOptions.green.head}</div>
          <div class="int-opt-body">${c.cycleOptions.green.body}</div>
        </div>
        <div class="int-opt blue">
          <div class="int-opt-head">${c.cycleOptions.blue.head}</div>
          <div class="int-opt-body">${c.cycleOptions.blue.body}</div>
        </div>
      </div>`;
    }
    if(c.coachNote) h += `<div class="coach-note">🎯 ${c.coachNote}</div>`;
    if(c.tip) h += `<div class="trainer-tip"><strong>Nota del entrenador</strong>${c.tip}</div>`;
  }
  el.innerHTML = h;
}

function switchAth(key) {
  document.querySelectorAll('.ath-tab').forEach(t => t.classList.toggle('active', t.dataset.ath===key));
  document.querySelectorAll('.athlete-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+key));
  // Auto-resolve this athlete's current week from today's date (no manual setting)
  const cw = computeCurrentWeek(key); if(cw) CURRENT_WEEK[key] = cw;
  const wk = CURRENT_WEEK[key] || 4;
  const items = document.querySelectorAll('.week-item');
  items.forEach(el => el.classList.remove('active','current'));
  if(items[wk-1]) items[wk-1].classList.add('active','current');
  const arr = getData(key);
  if(!arr) return;
  buildGrid('grid-'+key, arr, key);
  const ti = arr.findIndex(d => d.dayDate===TODAY_DATE || d.today);
  showDetail(key, ti >= 0 ? ti : arr.length-1);
  if(key==='valeria') setTimeout(function(){ renderCycleStatus(); }, 50);
}

const WEEK_DATA = {
  armando:  { 1: ARMANDO_W1 },
};
// --- Auto week detection (date-driven; no manual advancing needed) ---
function _parseDayDate(str){
  if(!str) return null;
  const p = String(str).trim().split(/\s+/);
  if(p.length<2) return null;
  const day = parseInt(p[0],10);
  const mon = _MESES_ABBR.indexOf(p[1]);
  if(isNaN(day) || mon<0) return null;
  return new Date(_HOY.getFullYear(), mon, day);
}
function computeCurrentWeek(ath){
  const weeks = WEEK_DATA[ath]; if(!weeks) return null;
  const today = new Date(_HOY.getFullYear(), _HOY.getMonth(), _HOY.getDate());
  const nums = Object.keys(weeks).map(Number).sort((a,b)=>a-b);
  let started=null, startedAt=null;
  for(const n of nums){
    const arr = weeks[n]; if(!arr||!arr.length) continue;
    const ds = arr.map(d=>_parseDayDate(d.dayDate)).filter(Boolean).map(d=>d.getTime());
    if(!ds.length) continue;
    const start = new Date(Math.min.apply(null, ds));
    const end   = new Date(Math.max.apply(null, ds));
    if(today>=start && today<=end) return n;            // today is inside this week
    if(start<=today && (startedAt===null || start.getTime()>startedAt)){ startedAt=start.getTime(); started=n; }
  }
  return started!==null ? started : nums[nums.length-1];  // fallback: latest started, else last
}
let CURRENT_WEEK = { armando:1 };

function getData(ath) {
  const wk = CURRENT_WEEK[ath] || 4;
  return (WEEK_DATA[ath] && WEEK_DATA[ath][wk]) ? WEEK_DATA[ath][wk] : null;
}

switchAth('armando');
var _aw = computeCurrentWeek('armando'); if(_aw) CURRENT_WEEK['armando']=_aw;

function selectWeek(n) {
  document.querySelectorAll('.week-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.week-item');
  if(items[n-1]) items[n-1].classList.add('active');

  const activeAth = document.querySelector('.ath-tab.active').dataset.ath;
  CURRENT_WEEK[activeAth] = n;
  const data = getData(activeAth);

  if(!data) {
    const det = document.getElementById('detail-' + activeAth);
    if(det) det.innerHTML = `<div class="rest-card">
      <div class="big-icon">📋</div>
      <p><strong>Semana ${n}</strong> — El plan detallado se cargará conforme se acerque la fecha.<br><br>
      ${activeAth==='valeria' ? 'La Semana 5 de Valeria ya está disponible — selecciónala.' : 'El entrenador actualizará esta semana próximamente.'}</p>
    </div>`;
    const g = document.getElementById('grid-' + activeAth);
    if(g) g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text3);font-size:13px;">Sin sesiones cargadas para Semana ${n}</div>`;
    CURRENT_WEEK[activeAth] = 4; // reset for safety

  }

  // Rebuild grid for this week and open first today/first session
  buildGrid('grid-' + activeAth, data, activeAth);
  const todayIdx = data.findIndex(d => d.dayDate===TODAY_DATE || d.today);
  showDetail(activeAth, todayIdx >= 0 ? todayIdx : 0);
}

//  CYCLE AUTO-TRACKER (Valeria)

const CYCLE_CONFIG = {
  anchorDate: '2026-06-01',  // Día 1 confirmado (primer sangrado)
  cycleLength: 28,           // Punto de partida — se recalibra con datos reales
};

function getCycleInfo(dateObj) {
  const anchor = new Date(CYCLE_CONFIG.anchorDate + 'T00:00:00');
  const target = dateObj || new Date();
  const t0 = new Date(target.getFullYear(), target.getMonth(), target.getDate());
  const daysDiff = Math.floor((t0 - anchor) / 86400000);
  let cycleDay = ((daysDiff % CYCLE_CONFIG.cycleLength) + CYCLE_CONFIG.cycleLength) % CYCLE_CONFIG.cycleLength + 1;

  let phase, phaseIdx, nextPhase, daysToNext;
  if (cycleDay <= 5) { phase='Menstrual'; phaseIdx=0; nextPhase='Folicular'; daysToNext=6-cycleDay; }
  else if (cycleDay <= 13) { phase='Folicular'; phaseIdx=1; nextPhase='Ovulación'; daysToNext=14-cycleDay; }
  else if (cycleDay <= 15) { phase='Ovulación'; phaseIdx=2; nextPhase='Lútea'; daysToNext=16-cycleDay; }
  else { phase='Lútea'; phaseIdx=3; nextPhase='Próximo periodo'; daysToNext=CYCLE_CONFIG.cycleLength-cycleDay+1; }

  return { cycleDay, phase, phaseIdx, nextPhase, daysToNext };
}

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) {
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return d.getDate() + ' ' + meses[d.getMonth()];
}

function renderCycleStatus() {
  const el = document.getElementById('cycle-status');
  if(!el) return;
  const today = new Date();
  const info = getCycleInfo(today);
  const anchor = new Date(CYCLE_CONFIG.anchorDate + 'T00:00:00');

  // Forecast key dates
  const daysSinceAnchor = Math.floor((new Date(today.getFullYear(),today.getMonth(),today.getDate()) - anchor)/86400000);
  const cyclesPassed = Math.floor(daysSinceAnchor / CYCLE_CONFIG.cycleLength);
  const currentCycleStart = addDays(anchor, cyclesPassed * CYCLE_CONFIG.cycleLength);
  const nextPeriod = addDays(currentCycleStart, CYCLE_CONFIG.cycleLength);
  const follicularStart = addDays(currentCycleStart, 5);
  const ovulation = addDays(currentCycleStart, 13);

  const phaseEmoji = ['🩸','🟢','⚠️','🌙'][info.phaseIdx];

  el.innerHTML = `
    <div class="cs-today">
      <span class="cs-day">${info.cycleDay}</span>
      <span class="cs-day-lbl">Día del ciclo</span>
    </div>
    <div>
      <div class="cs-phase">${phaseEmoji} Fase ${info.phase}</div>
      <div class="cs-next">${info.daysToNext > 0 ? info.daysToNext + ' día(s) → ' + info.nextPhase : 'Transición hoy → ' + info.nextPhase}</div>
    </div>
    <div class="cs-forecast">
      <div class="cs-fc-item"><span class="cs-fc-date">${fmtDate(follicularStart)}</span><span class="cs-fc-lbl">🟢 Folicular</span></div>
      <div class="cs-fc-item"><span class="cs-fc-date">${fmtDate(ovulation)}</span><span class="cs-fc-lbl">⚠️ Ovulación</span></div>
      <div class="cs-fc-item"><span class="cs-fc-date">${fmtDate(nextPeriod)}</span><span class="cs-fc-lbl">🩸 Próx. periodo</span></div>
    </div>
    <div class="cs-config">Ancla: ${fmtDate(anchor)} (Día 1) · Ciclo: ${CYCLE_CONFIG.cycleLength} días (se recalibra con datos reales) · Cálculo basado en la fecha de hoy del dispositivo</div>
  `;

  // Auto-highlight current phase in the selector
  selectCyclePhase(info.phaseIdx);
}

      <div class="m-stat"><span class="ms-val" style="font-size:12px;">${s.summary.extra}</span><span class="ms-lbl">Adicional</span></div>
    </div>
    <div class="metrics-grid">`;

  s.charts.forEach(ch => {
    html += `<div class="metric-card" style="padding:14px 16px;">
      <div class="chart-label">${ch.title}</div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:8px;">${ch.sub}</div>
      ${ch.kind==='hbar' ? buildHBar(ch) : buildVBar(ch)}
    </div>`;
  });

  html += `</div>`;

  if(s.note) {
    html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.7;">${s.note}</div>`;
  }

  html += `</div>`;
  return html;
}

// ── Horizontal bar chart (FC zones) ──────────────────────
function buildHBar(ch) {
  let html = '';
  ch.bars.forEach(b => {
    const w = Math.max(b.val, 0.5);
    const isTarget = b.target !== null && b.val >= b.target;
    html += `<div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
        <span style="font-size:11px;color:var(--text2);">${b.label}</span>
        <span style="font-size:11px;font-weight:700;color:${b.color};">${b.val}%${b.target?` <span style="color:${isTarget?'var(--green)':'var(--red)'};">${isTarget?'✅':'⚠️'}</span>`:''}</span>
      </div>
      <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${w}%;background:${b.color};border-radius:4px;transition:width .4s;"></div>
      </div>
    </div>`;
  });
  return html;
}

// ── Vertical bar chart (cadence, power, swim pace, FC) ────────────────
function buildVBar(ch) {
  const W = 340, H = 140, PAD_L = 36, PAD_B = 28, PAD_T = 10, PAD_R = 8;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const vals = ch.vals;
  const n = vals.length;

  const yMin = ch.yMin !== undefined ? ch.yMin : 0;
  const yMax = ch.yMax !== undefined ? ch.yMax : Math.ceil(Math.max(...vals) * 1.12);
  const yRange = yMax - yMin;

  const barW = (chartW / n) * 0.6;
  const gap   = (chartW / n) * 0.4;

  function yPx(v) { return PAD_T + chartH - ((v - yMin) / yRange) * chartH; }

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;">`;

  // Grid lines
  const gridVals = 4;
  for(let i = 0; i <= gridVals; i++) {
    const v = yMin + (yRange / gridVals) * i;
    const y = yPx(v);
    svg += `<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>`;
    svg += `<text x="${PAD_L-4}" y="${y+3}" text-anchor="end" fill="#94a3b8" font-size="8" font-family="Space Mono,monospace">${Math.round(v)}</text>`;
  }

  // Target line
  if(ch.target !== undefined) {
    const ty = yPx(ch.target);
    svg += `<line x1="${PAD_L}" y1="${ty}" x2="${W-PAD_R}" y2="${ty}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg += `<text x="${W-PAD_R+2}" y="${ty+3}" fill="#ef4444" font-size="8" font-family="Space Mono,monospace">${ch.target}</text>`;
  }

  // Target2 line
  if(ch.target2 !== undefined) {
    const ty2 = yPx(ch.target2);
    svg += `<line x1="${PAD_L}" y1="${ty2}" x2="${W-PAD_R}" y2="${ty2}" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg += `<text x="${W-PAD_R+2}" y="${ty2+3}" fill="#10b981" font-size="8" font-family="Space Mono,monospace">${ch.target2}</text>`;
  }

  // Bars
  vals.forEach((v, i) => {
    const x = PAD_L + (i / n) * chartW + gap/2;
    const barH = ((v - yMin) / yRange) * chartH;
    const y = PAD_T + chartH - barH;
    const color = ch.colors ? ch.colors[i] : ch.color || '#0284c7';
    const label = ch.customLabels ? ch.customLabels[i] : v;

    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="2" opacity="0.85"/>`;
    svg += `<text x="${x + barW/2}" y="${y - 3}" text-anchor="middle" fill="${color}" font-size="8.5" font-weight="700" font-family="Barlow Condensed,sans-serif">${label}</text>`;
    svg += `<text x="${x + barW/2}" y="${H - 6}" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Space Mono,monospace">${ch.xLabels[i]}</text>`;
  });

  // Axes
  svg += `<line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${H-PAD_B}" stroke="#cbd5e1" stroke-width="1.5"/>`;
  svg += `<line x1="${PAD_L}" y1="${H-PAD_B}" x2="${W-PAD_R}" y2="${H-PAD_B}" stroke="#cbd5e1" stroke-width="1.5"/>`;

  svg += `</svg>`;
  return `<div class="chart-wrap">${svg}</div>`;
}

(function(){
  let deferredPrompt = null;
  // Floating install button
  function makeInstallBtn(){
    if(document.getElementById('pwa-install-btn')) return;
    const b = document.createElement('button');
    b.id = 'pwa-install-btn';
    b.textContent = '📲 Instalar app';
    b.style.cssText = 'position:fixed;bottom:18px;right:18px;z-index:9999;background:#1a2030;color:#f0c842;border:1px solid #f0c842;border-radius:24px;padding:11px 18px;font-family:sans-serif;font-weight:700;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer;';
    b.onclick = async function(){
      if(deferredPrompt){
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        b.remove();
      }
    };
    document.body.appendChild(b);
  }
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    makeInstallBtn();
  });
  window.addEventListener('appinstalled', function(){
    const b = document.getElementById('pwa-install-btn');
    if(b) b.remove();
  });
  // iOS hint (no beforeinstallprompt on Safari)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if(isIOS && !isStandalone){
    window.addEventListener('load', function(){
      setTimeout(function(){
        if(document.getElementById('pwa-ios-hint')) return;
        const h = document.createElement('div');
        h.id = 'pwa-ios-hint';
        h.innerHTML = 'Para instalar: toca <strong>Compartir</strong> ⬆️ y luego <strong>"Agregar a inicio"</strong> &nbsp;<span style="opacity:.6;cursor:pointer;" onclick="this.parentNode.remove()">✕</span>';
        h.style.cssText = 'position:fixed;bottom:18px;left:18px;right:18px;z-index:9999;background:#1a2030;color:#fff;border-radius:12px;padding:12px 16px;font-family:sans-serif;font-size:13px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25);';
        document.body.appendChild(h);
        setTimeout(function(){ if(h.parentNode) h.remove(); }, 12000);
      }, 1500);
    });
  }
  // Service worker (offline) — registra si el entorno lo permite
  if('serviceWorker' in navigator){
    try {
      const swCode = 'self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!=="604tri-v2").map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).then(resp=>{const cp=resp.clone();caches.open("604tri-v2").then(c=>c.put(e.request,cp));return resp;}).catch(()=>caches.match(e.request)))});';
      const blob = new Blob([swCode], {type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
    } catch(e){}
  }
})();
